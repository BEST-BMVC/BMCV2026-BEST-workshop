<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Rubik+Mono+One&amp;display=swap');
      .styled-text {
        font-family: 'Rubik Mono One', monospace;
        fill: #FFFFAA;
        font-size: 60px;
        text-anchor: middle;
        dominant-baseline: central;
      }
    </style>
  </defs>

  <!-- Background with original proportional rounded corners, updated color -->
  <rect width="64" height="64" rx="16" fill="#8800FF" />

  <!-- Centered letter "B" in Rubik Mono One -->
  <text x="32" y="33.5" class="styled-text">B</text>
</svg>
